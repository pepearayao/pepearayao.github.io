    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Pepe Araya | Terminal</title>
    <meta name="description" content="Pepe Araya — Tradecraft Engineering Manager at Maltego Technologies. Python, OSINT, web scraping, and full-stack builder." />
    <meta property="og:title" content="Pepe Araya | Terminal" />
    <meta property="og:description" content="Interactive terminal portfolio — type 'help' to explore." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" media="screen" href="css/style.css" />
  </head>
  <body onclick="document.getElementById('texter').focus();">
    <div id="terminal">
      <a id="before"></a>
    </div>
    <div id="command">
      <textarea
        type="text"
        id="texter"
        onkeyup="typeIt(this, event)"
        onkeydown="typeIt(this, event);
                   moveIt(this.value.length, event)"
        onkeypress="typeIt(this, event);"
        autofocus
      ></textarea>
      <div id="liner">
        <span id="typer"></span><b class="cursor" id="cursor">█</b>
      </div>
    </div>

    <!-- Mobile UI Helpers -->
    <div id="mobile-helpers" class="mobile-only">
      <div id="quick-commands">
        <button class="quick-cmd" data-cmd="help" aria-label="Help" title="Help">?</button>
        <button class="quick-cmd" data-cmd="clear" aria-label="Clear" title="Clear">✕</button>
      </div>
      <button id="toggle-keyboard" aria-label="Toggle keyboard" title="Toggle keyboard">⌨️</button>
    </div>

    <script src="js/caret.js"></script>
    <script src="js/commands.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
